name: fashion_store
description: Fashion Store Mobile Application - Phase 1

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  provider: ^6.1.1
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  payhere_mobilesdk_flutter: ^3.2.3
  pdf: ^3.10.8
  path_provider: ^2.1.2
  intl: ^0.19.0
  share_plus: ^7.2.2
  permission_handler: ^11.3.0
  image_picker: ^1.0.7
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
